<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRUD categoria</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300..700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../static/style/style.css">
</head>
<body>
    <div class="container">
        <div class="justify-content-center">
            <div class="text-center">
                <h1>Categorias</h1>
                <input id="input">
                <div class="buttons">
                    <button type="button" id="butao1" class="btn btn-primary">Enviar Categoria</button>
                    <button type="button" id="butao2" class="btn btn-success">Ver categoria</button>
                    <button type="button" id="butao3" class="btn btn-danger">Deletar categoria</button>
                </div>
                <div class="resultado" id="resultado">Coloque uma categoria</div>
            </div>
        </div>
    </div>
    <script src="../static/script.js/script.js"></script>
</body>
</html>
